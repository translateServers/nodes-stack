# 前端 nginx 配置: SPA 静态文件服务 + /api 反向代理到后端
#
# 反向代理目标通过环境变量 BACKEND_URL 注入:
#   - 传统 docker-compose: BACKEND_URL=http://server:3000 (服务名)
#   - CloudBase CloudRun: BACKEND_URL=https://nebula-server-xxx.tcloudbaseapp.com (公网地址)
#   - 本地开发: BACKEND_URL=http://localhost:3000
#
# nginx 本身不支持环境变量替换,通过 docker-entrypoint 用 envsubst 渲染模板

server {
    listen 80;
    server_name _;

    # SPA 静态文件根目录
    root /usr/share/nginx/html;
    index index.html;

    # 启用 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # 上传文件大小限制(与后端 FILE_MAX_SIZE 对齐)
    client_max_body_size 10m;

    # /api 反向代理到后端服务
    # BACKEND_URL 由容器启动时 envsubst 注入,默认回退到 http://server:3000
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 支持(若后端使用 Socket.IO 等)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    # 静态资源缓存(hash 文件名,长期缓存)
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpe?g|gif|svg|webp|ico|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA 路由回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
