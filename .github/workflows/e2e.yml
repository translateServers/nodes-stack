name: E2E Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_PROVIDER: sqlite
      DATABASE_URL: file:./test-e2e.db
      JWT_SECRET: e2e-test-jwt-secret-minimum-32-chars-long
      JWT_REFRESH_SECRET: e2e-test-refresh-secret-minimum-32-chars
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      API_PREFIX: api/v1
      CORS_ORIGIN: '*'
      ENABLE_SWAGGER: 'false'
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      REDIS_LAZY_CONNECT: 'true'
      CI: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @nebula/web exec playwright install --with-deps chromium

      - name: Generate Prisma client
        run: pnpm --filter @nebula/nestjs-server exec prisma generate

      - name: Push database schema
        run: pnpm --filter @nebula/nestjs-server exec prisma db push --accept-data-loss

      - name: Run E2E tests
        run: pnpm --filter @nebula/web run e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/e2e/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: apps/web/e2e/test-results/
          retention-days: 7
